# =============================================================================
# alembic.ini — Alembic Database Migration Configuration
# =============================================================================
# Alembic is a database migration tool for SQLAlchemy. It tracks changes to
# your database schema (tables, columns, indexes) over time, similar to how
# Git tracks changes to code. Each change is stored as a "revision" (migration
# script) inside the alembic/versions/ folder.
#
# Common commands:
#   alembic revision --autogenerate -m "description"  → create a new migration
#   alembic upgrade head                               → apply all pending migrations
#   alembic downgrade -1                               → undo the last migration
# =============================================================================

[alembic]
# Where Alembic looks for its env.py script and the versions/ folder.
# "alembic" means the folder named "alembic/" next to this file.
script_location = alembic

# Template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# see https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
# for all available tokens
 file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Adds the current directory (".") to Python's module search path so that
# Alembic can import your app code (e.g. `from app.database import Base`).
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python>=3.9 or backports.zoneinfo library.
# Any required deps can installed by adding `alembic[tz]` to the pip requirements
# string value is passed to ZoneInfo()
# leave blank for localtime
timezone =

# Max length of characters to apply to the
# "slug" field (the short description part of the filename, e.g. "add_users_table").
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
sourceless = false

# version location specification; This defaults
# to alembic/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used here should be the separator specified by "version_path_separator" below.
version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses os.pathsep.
# If this key is omitted entirely, it falls back to the legacy behavior of splitting on spaces and/or commas.
# Valid values for version_path_separator are:
#
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space
version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.

# Set to 'true' to search source files recursively
# in each "version_locations" directory
# new in Alembic version 1.10
recursive_version_locations = false

# The output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# The database connection URL Alembic uses when running migrations directly
# (i.e. via `alembic upgrade head` without going through the app).
# Format: postgresql://<user>:<password>@<host>:<port>/<database>
# NOTE: In production, avoid hardcoding credentials here. Instead, override
# this value in alembic/env.py by reading from your .env file via app.config.settings.
sqlalchemy.url = postgresql://ems_user:StrongPassword123!@localhost:5432/ems_db


# =============================================================================
# [post_write_hooks] — Optional scripts that run after a new migration file
# is generated. Useful for auto-formatting migration files.
# =============================================================================
[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# Format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Lint with attempts to fix using "ruff" - use the exec runner, execute a binary
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME


# =============================================================================
# Logging configuration
# Python's standard logging system is configured here so Alembic (and
# SQLAlchemy) can print status messages to the console while running.
# =============================================================================

# [loggers] lists every named logger that has its own section below.
[loggers]
keys = root,sqlalchemy,alembic

# [handlers] lists the output destinations (console, file, etc.).
[handlers]
keys = console

# [formatters] lists the message format templates.
[formatters]
keys = generic

# Root logger — catches everything not handled by a more specific logger.
# WARN level means only warnings and errors are shown (not routine info messages).
[logger_root]
level = WARN
handlers = console
qualname =

# SQLAlchemy logger — controls whether raw SQL statements are printed.
# WARN hides them; change to INFO to see every query (useful for debugging).
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic logger — INFO level shows migration progress messages like
# "Running upgrade abc123 -> def456, add users table".
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# Console handler — writes log output to stderr (the terminal).
# NOTSET means this handler defers to each logger's own level setting.
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# Message format: "LEVEL [logger_name] message"  at  HH:MM:SS
# Example: "INFO  [alembic.runtime.migration] Running upgrade abc -> def"
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

